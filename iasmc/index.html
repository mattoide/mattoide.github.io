<script>
// Auto-detect language from browser, default to EN
let currentLang = localStorage.getItem('iasmc-lang');
if (!currentLang) {
    const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    currentLang = browserLang.startsWith('it') ? 'it' : 'en';
}
setLang(currentLang);

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('iasmc-lang', lang);
    document.documentElement.lang = lang;

    // Update all elements with data-en/data-it
    document.querySelectorAll('[data-en]').forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text) {
            if (el.tagName === 'A' || el.tagName === 'BUTTON') {
                el.textContent = text;
            } else {
                el.innerHTML = text;
            }
        }
    });

    // Update active button
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-it').classList.toggle('active', lang === 'it');

    // Update page title
    document.title = lang === 'it'
        ? 'IASMC — Segnali Trading Automatici | Canale Telegram Gratis'
        : 'IASMC — Automated Trading Signals | Free Telegram Channel';
}
</script>
